<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@400;500;600;700&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/history-modal.css">
</head>
<body>

<header>
  <h1>
    <img src="logo.png" alt="Clay and Bean logo" class="brand-mark" />
    Clay & Bean <span class="flow">Flow</span>
  </h1>
  <div class="live-dot">Live</div>
  <div class="header-right">
    <span class="order-count" id="order-count">0 active</span>
    <button type="button" class="demo-btn" id="history-recall-btn" title="Recent orders from the app (saved here for reference)">Recent orders</button>
  </div>
</header>

<div id="board-container">
  <div class="board-empty-state" id="empty-state">
    <div class="icon">🫙</div>
    <span>Waiting for orders...</span>
  </div>
  <div class="board-rows hidden" id="board-rows">
    <section class="board-row">
      <h2 class="board-row-label takeaway">Takeaway</h2>
      <div class="board-row-scroll" id="board-takeaway"></div>
    </section>
    <section class="board-row">
      <h2 class="board-row-label eat-in">Eat in</h2>
      <div class="board-row-scroll" id="board-eat-in"></div>
    </section>
  </div>
</div>

<div class="modal-overlay hidden" id="history-modal-overlay">
  <div class="history-modal" id="history-modal" role="dialog" aria-labelledby="history-modal-title" aria-modal="true">
    <div class="history-modal-header">
      <h2 id="history-modal-title">Recent orders</h2>
      <button type="button" class="order-modal-close" id="history-modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="history-period-tabs">
      <button type="button" data-history-period="hour">Last hour</button>
      <button type="button" data-history-period="today">Today</button>
      <button type="button" data-history-period="week">This week</button>
    </div>
    <div class="history-modal-body" id="history-modal-list"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
